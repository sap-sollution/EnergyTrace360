version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: energytrace360-db
    environment:
      POSTGRES_USER: energytrace
      POSTGRES_PASSWORD: energytrace360
      POSTGRES_DB: energytrace360
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed-data.sql:/docker-entrypoint-initdb.d/02-seed-data.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U energytrace"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: energytrace360-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://energytrace:energytrace360@postgres:5432/energytrace360
      JWT_SECRET: dev-secret-key-change-in-production
      PORT: 3001
      SAP_ADAPTER_URL: http://sap-adapter:3002
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - energytrace360

  # SAP MM Mock Adapter
  sap-adapter:
    build:
      context: ./backend/sap-mock-adapter
      dockerfile: Dockerfile
    container_name: energytrace360-sap-adapter
    environment:
      NODE_ENV: development
      PORT: 3002
    ports:
      - "3002:3002"
    command: npm run dev
    networks:
      - energytrace360

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: energytrace360-frontend
    environment:
      REACT_APP_API_URL: http://localhost:3001/api
      REACT_APP_SAP_ADAPTER_URL: http://localhost:3002/sap
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm start
    networks:
      - energytrace360

volumes:
  postgres_data:

networks:
  energytrace360:
    driver: bridge
